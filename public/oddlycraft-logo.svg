<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 175" width="760" height="175">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');
    </style>
  </defs>

  <!-- Main logo text – stroke added to eliminate blurriness -->
  <text
    font-family="'Lilita One', 'Fredoka One', cursive"
    font-weight="900"
    font-size="132"
    fill="#881338"
    stroke="#881338"
    stroke-width="2"
    stroke-linejoin="round"
    paint-order="stroke fill"
    x="10"
    y="150"
    letter-spacing="1"
  >Oddly Craft</text>

  <!-- Flower on O – color #FF87B0, rotated ~25° clockwise -->
  <g transform="translate(53, 51) rotate(25)">
    <!-- 5 round petals -->
    <circle cx="0"      cy="-13"   r="8.5" fill="#FF87B0"/>
    <circle cx="12.36"  cy="-4.05" r="8.5" fill="#FF87B0"/>
    <circle cx="7.64"   cy="10.56" r="8.5" fill="#FF87B0"/>
    <circle cx="-7.64"  cy="10.56" r="8.5" fill="#FF87B0"/>
    <circle cx="-12.36" cy="-4.05" r="8.5" fill="#FF87B0"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="8"   fill="#FF87B0"/>
    <circle cx="0" cy="0" r="4.5" fill="white"/>
  </g>

</svg>
